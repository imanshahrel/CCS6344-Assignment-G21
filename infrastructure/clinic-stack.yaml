AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Clinic Management System - Secure AWS Infrastructure
  CCS6344 T2610 Assignment 2
  Provisions VPC, subnets, EC2, RDS, Security Groups, NACLs,
  IAM roles, Secrets Manager, S3, and CloudWatch alarms.

# ─────────────────────────────────────────────────────────────────────────────
# PARAMETERS — values you fill in when deploying the stack
# ─────────────────────────────────────────────────────────────────────────────
Parameters:

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of the EC2 Key Pair for SSH access
    Default: clinic-keypair

  DBUsername:
    Type: String
    Description: Master username for the RDS MySQL instance
    Default: admin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9]*"

  DBPassword:
    Type: String
    Description: Master password for the RDS MySQL instance (min 8 characters)
    NoEcho: true
    MinLength: 8
    MaxLength: 41

  DBName:
    Type: String
    Description: Name of the MySQL database
    Default: clinic_db

  JWTSecret:
    Type: String
    Description: Secret key used to sign JWT tokens (min 32 characters)
    NoEcho: true
    MinLength: 32

  EC2InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro

  GitHubRepo:
    Type: String
    Description: GitHub repository HTTPS URL
    Default: https://github.com/imanshahrel/CCS6344-Assignment-G21.git

  GitHubBranch:
    Type: String
    Description: Branch to deploy
    Default: main

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── 1. VPC ────────────────────────────────────────────────────────────────
  ClinicVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: clinic-vpc

  # ── 2. Internet Gateway ───────────────────────────────────────────────────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: clinic-igw

  AttachInternetGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ClinicVPC
      InternetGatewayId: !Ref InternetGateway

  # ── 3. Subnets ────────────────────────────────────────────────────────────

  # Public Subnet — us-east-1a — hosts EC2 and NAT Gateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ClinicVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: clinic-public-subnet

  # Private Subnet 1 — us-east-1a — hosts primary RDS instance
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ClinicVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-east-1a
      Tags:
        - Key: Name
          Value: clinic-private-subnet-1

  # Private Subnet 2 — us-east-1b — hosts RDS standby (Multi-AZ)
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ClinicVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: us-east-1b
      Tags:
        - Key: Name
          Value: clinic-private-subnet-2

  # ── 4. NAT Gateway ────────────────────────────────────────────────────────
  # Allows EC2 in public subnet to reach internet for outbound requests
  NATGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachInternetGateway
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: clinic-nat-gateway

  # ── 5. Route Tables ───────────────────────────────────────────────────────

  # Public route table — routes internet traffic via IGW
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ClinicVPC
      Tags:
        - Key: Name
          Value: clinic-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachInternetGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Private route table — routes outbound traffic via NAT Gateway
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ClinicVPC
      Tags:
        - Key: Name
          Value: clinic-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── 6. Network ACLs ───────────────────────────────────────────────────────

  # Public NACL — allows HTTP, HTTPS, SSH, and ephemeral ports
  PublicNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref ClinicVPC
      Tags:
        - Key: Name
          Value: clinic-public-nacl

  # Inbound rules
  PublicNACLInboundHTTPS:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 443
        To: 443

  PublicNACLInboundHTTP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNACL
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  PublicNACLInboundSSH:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNACL
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 22
        To: 22

  PublicNACLInboundEphemeral:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNACL
      RuleNumber: 130
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  # Outbound rules
  PublicNACLOutboundAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  PublicSubnetNACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      NetworkAclId: !Ref PublicNACL

  # Private NACL — only allows MySQL from VPC and return traffic
  PrivateNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref ClinicVPC
      Tags:
        - Key: Name
          Value: clinic-private-nacl

  PrivateNACLInboundMySQL:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 10.0.0.0/16
      PortRange:
        From: 3306
        To: 3306

  PrivateNACLInboundEphemeral:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateNACL
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  PrivateNACLOutboundAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  PrivateSubnet1NACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      NetworkAclId: !Ref PrivateNACL

  PrivateSubnet2NACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      NetworkAclId: !Ref PrivateNACL

  # ── 7. Security Groups ────────────────────────────────────────────────────

  # ALB Security Group — accepts HTTPS and HTTP from internet
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Application Load Balancer
      VpcId: !Ref ClinicVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from internet
      Tags:
        - Key: Name
          Value: SG-ALB

  # EC2 Security Group (SG-Web) — accepts traffic from ALB only
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 application server (SG-Web)
      VpcId: !Ref ClinicVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow HTTP from ALB only
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow HTTPS from ALB only
        - IpProtocol: tcp
          FromPort: 5001
          ToPort: 5001
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow Node.js API port from ALB
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH for deployment
      Tags:
        - Key: Name
          Value: SG-Web

  # RDS Security Group (SG-DB) — accepts MySQL from EC2 only
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS MySQL instance (SG-DB)
      VpcId: !Ref ClinicVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Allow MySQL from EC2 (SG-Web) only
      Tags:
        - Key: Name
          Value: SG-DB

  # ── 8. IAM Role for EC2 ───────────────────────────────────────────────────
  # Allows EC2 to access Secrets Manager and CloudWatch without credentials

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: clinic-ec2-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: clinic-secrets-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref ClinicAppSecret
        - PolicyName: clinic-s3-backup-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "${BackupBucket.Arn}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: clinic-ec2-profile
      Roles:
        - !Ref EC2InstanceRole

  # ── 9. Secrets Manager ────────────────────────────────────────────────────
  # Stores all application secrets — replaces .env file

  ClinicAppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: clinic-app-secrets
      Description: Database credentials and JWT secret for the Clinic Management System
      SecretString: !Sub |
        {
          "DB_HOST": "placeholder",
          "DB_USER": "${DBUsername}",
          "DB_PASSWORD": "${DBPassword}",
          "DB_NAME": "${DBName}",
          "JWT_SECRET": "${JWTSecret}",
          "PORT": "5001"
        }
      Tags:
        - Key: Name
          Value: clinic-app-secrets

  # ── 10. S3 Bucket for Backups ─────────────────────────────────────────────
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "clinic-backups-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: clinic-backup-bucket

  # ── 11. RDS Subnet Group ──────────────────────────────────────────────────
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Clinic RDS instance (Multi-AZ requires 2 AZs)
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: clinic-rds-subnet-group

  # ── 12. RDS MySQL Instance ────────────────────────────────────────────────
  ClinicRDS:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: clinic-db
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBName: !Ref DBName
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      MultiAZ: true
      StorageType: gp2
      AllocatedStorage: "20"
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: clinic-rds

  # ── 13. Application Load Balancer ─────────────────────────────────────────
  ClinicALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: clinic-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet
        - !Ref PrivateSubnet1
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: clinic-alb

  # Target group — points to EC2 on port 5001
  ClinicTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: clinic-tg
      Protocol: HTTP
      Port: 5001
      VpcId: !Ref ClinicVPC
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: clinic-target-group

  # HTTP listener — forwards to target group
  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ClinicALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ClinicTargetGroup

  # ── 14. Auto Scaling Group ────────────────────────────────────────────────
  ClinicLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: clinic-launch-template
      LaunchTemplateData:
        ImageId: ami-0c02fb55956c7d316
        InstanceType: !Ref EC2InstanceType
        KeyName: !Ref KeyPairName
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            curl -fsSL https://rpm.nodesource.com/setup_18.x | bash -
            yum install -y nodejs git mysql
            cd /home/ec2-user
            git clone -b ${GitHubBranch} ${GitHubRepo} app
            cd app/server
            npm install
            echo "App installed. SSH in to start the server."
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: clinic-ec2

  ClinicAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: clinic-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref ClinicLaunchTemplate
        Version: !GetAtt ClinicLaunchTemplate.LatestVersionNumber
      MinSize: "1"
      MaxSize: "2"
      DesiredCapacity: "1"
      VPCZoneIdentifier:
        - !Ref PublicSubnet
      TargetGroupARNs:
        - !Ref ClinicTargetGroup
      Tags:
        - Key: Name
          Value: clinic-asg-instance
          PropagateAtLaunch: true

  # ── 15. CloudWatch Alarms ─────────────────────────────────────────────────

  # Alarm for high CPU usage on EC2
  EC2CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: clinic-ec2-high-cpu
      AlarmDescription: Alert when EC2 CPU exceeds 80%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref ClinicAutoScalingGroup

  # Alarm for RDS high database connections
  RDSConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: clinic-rds-high-connections
      AlarmDescription: Alert when RDS connections exceed 50
      MetricName: DatabaseConnections
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref ClinicRDS

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS — values shown after stack creation, useful for next steps
# ─────────────────────────────────────────────────────────────────────────────
Outputs:

  VPCId:
    Description: VPC ID
    Value: !Ref ClinicVPC

  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet

  ALBDNSName:
    Description: Application Load Balancer DNS Name - use this to access the app
    Value: !GetAtt ClinicALB.DNSName

  RDSEndpoint:
    Description: RDS MySQL endpoint - update in Secrets Manager after stack creation
    Value: !GetAtt ClinicRDS.Endpoint.Address

  SecretARN:
    Description: ARN of the Secrets Manager secret
    Value: !Ref ClinicAppSecret

  BackupBucketName:
    Description: S3 bucket name for backups
    Value: !Ref BackupBucket
